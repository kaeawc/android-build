---
name: scroll-to-education
description: Scroll the resume to the Education and Talks sections and verify their content
steps:
  - tool: launchApp
    appId: dev.jasonpearson.android
    clearAppData: true

  - tool: swipeOn
    direction: up
    lookFor:
      text: Hinge

  - tool: swipeOn
    direction: up
    lookFor:
      text: Education

  - tool: observe
    waitFor:
      text: New Jersey Institute of Technology

  - tool: swipeOn
    direction: up
    lookFor:
      text: Talks

  - tool: observe
    waitFor:
      text: Droidcon

  - tool: terminateApp
    appId: dev.jasonpearson.android
